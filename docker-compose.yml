version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aig
      POSTGRES_PASSWORD: aig
      POSTGRES_DB: aig
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - '3333:3333'
    depends_on:
      - postgres
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  db-data:
