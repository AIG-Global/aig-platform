<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="128" cy="85" r="50" fill="#f5a962"/>
  
  <!-- Hair -->
  <path d="M 78 85 Q 78 40 128 35 Q 178 40 178 85" fill="#2c1810"/>
  <circle cx="98" cy="55" r="8" fill="#2c1810"/>
  <circle cx="158" cy="55" r="8" fill="#2c1810"/>
  
  <!-- Eyes -->
  <circle cx="110" cy="80" r="6" fill="#ffffff"/>
  <circle cx="146" cy="80" r="6" fill="#ffffff"/>
  <circle cx="111" cy="81" r="3" fill="#1e40af"/>
  <circle cx="147" cy="81" r="3" fill="#1e40af"/>
  <circle cx="112" cy="79" r="1.5" fill="#000000"/>
  <circle cx="148" cy="79" r="1.5" fill="#000000"/>
  
  <!-- Eyebrows -->
  <path d="M 102 70 Q 110 68 118 70" stroke="#2c1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 138 70 Q 146 68 154 70" stroke="#2c1810" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 128 80 L 128 95" stroke="#d4845f" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="122" cy="96" rx="3" ry="2" fill="#d4845f"/>
  <ellipse cx="134" cy="96" rx="3" ry="2" fill="#d4845f"/>
  
  <!-- Smile (happy expression) -->
  <path d="M 110 105 Q 128 115 146 105" stroke="#2c1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="115" y="130" width="26" height="15" fill="#f5a962"/>
  
  <!-- Shoulders & Upper Body -->
  <ellipse cx="128" cy="160" rx="55" ry="35" fill="#3b82f6"/>
  
  <!-- Professional jacket details -->
  <path d="M 73 160 Q 73 140 128 135 Q 183 140 183 160" stroke="#1e40af" stroke-width="2" fill="none"/>
  
  <!-- Shirt collar -->
  <path d="M 110 145 L 105 160 L 128 157 L 151 160 L 146 145" fill="#ffffff" opacity="0.9"/>
  
  <!-- Hair strands -->
  <path d="M 88 70 Q 85 90 90 120" stroke="#2c1810" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 168 70 Q 171 90 166 120" stroke="#2c1810" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Professional aura (subtle gradient glow effect) -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0" />
    </radialGradient>
  </defs>
  <circle cx="128" cy="110" r="70" fill="url(#glow)"/>
  
  <!-- Sparkle accents -->
  <circle cx="155" cy="55" r="2" fill="#fbbf24" opacity="0.8"/>
  <circle cx="101" cy="48" r="2" fill="#fbbf24" opacity="0.8"/>
  <circle cx="170" cy="95" r="1.5" fill="#fbbf24" opacity="0.6"/>
</svg>
