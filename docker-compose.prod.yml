version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aig-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-aig_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_strong_password}
      POSTGRES_DB: ${DB_NAME:-aig_platform}
      POSTGRES_MAX_CONNECTIONS: 100
      POSTGRES_SHARED_BUFFERS: 256MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-aig_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aig-network
    security_opt:
      - no-new-privileges:true

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: aig-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change_me_redis_password}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aig-network
    security_opt:
      - no-new-privileges:true

  # NestJS API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: aig-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-aig_user}:${DB_PASSWORD:-change_me_strong_password}@postgres:5432/${DB_NAME:-aig_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change_me_redis_password}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 7d
      API_PORT: 3333
      API_HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3333:3333"
    volumes:
      - ./logs/api:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aig-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Next.js Web App
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
    container_name: aig-web
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3333}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./logs/web:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/auth"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aig-network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: aig-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - web
      - api
    networks:
      - aig-network
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  aig-network:
    driver: bridge
