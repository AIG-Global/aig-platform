<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Completion certificate — AIG Secure Sign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .cert-shell { max-width: 800px; margin: 0 auto; padding: 30px 24px 60px; }
  .cert-header { text-align: center; margin-bottom: 30px; }
  .cert-header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--amber); display: inline-block; margin-right: 8px; }
  .cert-title { font-size: 20px; font-weight: 700; margin: 14px 0 4px; }
  .cert-doc-hash { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); word-break: break-all; }
  .cert-section { margin: 24px 0; }
  .cert-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-dim); margin-bottom: 10px; }
  .signer-cert-card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; margin-bottom: 10px; display: flex; gap: 16px; align-items: flex-start; }
  .signer-cert-sig-img { width: 140px; height: 50px; object-fit: contain; background: #fff; border-radius: 4px; flex-shrink: 0; }
  .signer-cert-meta { font-size: 12px; color: var(--text-dim); line-height: 1.7; }
  .signer-cert-meta b { color: var(--text); font-size: 13.5px; }
  .audit-table { width: 100%; font-size: 11.5px; border-collapse: collapse; }
  .audit-table th { text-align: left; color: var(--text-faint); font-weight: 600; padding: 6px 10px; border-bottom: 1px solid var(--line); font-size: 10px; text-transform: uppercase; }
  .audit-table td { padding: 7px 10px; border-bottom: 1px solid var(--line); color: var(--text-dim); }
  .hash-chip { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .chain-integrity-box { padding: 14px 16px; border-radius: 6px; margin-top: 16px; font-size: 12.5px; }
  .chain-integrity-box.valid { background: rgba(95,184,138,0.1); border: 1px solid var(--green); color: var(--green); }
  .chain-integrity-box.invalid { background: rgba(211,104,95,0.1); border: 1px solid var(--red); color: var(--red); }
  @media print { .topbar, .no-print { display: none !important; } body { background: #fff; color: #111; } .panel, .signer-cert-card { border-color: #ccc; } }
</style>
</head>
<body>

<div class="topbar no-print">
  <div class="brand"><span class="dot"></span>AIG SECURE SIGN</div>
  <button class="btn-key" onclick="window.print()">Print / save as PDF</button>
</div>

<div class="cert-shell" id="certRoot">
  <div id="loadingState" style="text-align:center; padding:60px 0; color:var(--text-faint);">Loading certificate&hellip;</div>
  <div id="errorState" style="display:none;" class="notice-banner error show"></div>
  <div id="certContent" style="display:none;"></div>
</div>

<script src="crypto-utils.js"></script>
<script src="certificate.js"></script>
</body>
</html>
