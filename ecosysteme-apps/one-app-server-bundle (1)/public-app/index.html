      media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
<link rel="apple-touch-icon" href="./assets/logo-icon.png" />
<style>
/* ================================================================
   DESIGN TOKENS
================================================================ */
:root{
  --ink:        #070707;
  --ink-2:      #020617;
  --panel:      rgba(255,255,255,0.045);
  --panel-2:    rgba(255,255,255,0.08);
  --panel-3:    rgba(255,255,255,0.12);
  --hairline:   rgba(255,255,255,0.10);
  --hairline-2: rgba(255,189,0,0.30);
  --paper:      #EDF1F8;
  --text-hi:    rgba(255,255,255,0.96);
  --text-mid:   rgba(255,255,255,0.62);
  --text-low:   rgba(255,255,255,0.42);
  --amber:      #FFBD00;
  --amber-dim:  #8A6400;
  --amber-tint: rgba(255,189,0,0.14);
  --gold:       #FFBD00;
  --gold-dim:   #8A6400;
  --gold-tint:  rgba(255,189,0,0.14);
  --good:       #2FB873;
  --good-tint:  rgba(47,184,115,0.15);
  --warn:       #FF8A00;
  --warn-tint:  rgba(255,138,0,0.16);
  --bad:        #D20202;
  --bad-tint:   rgba(210,2,2,0.18);
  --teal:       #3E7C7C;
  --teal-tint:  rgba(62,124,124,0.14);
  --purple:     #8B5FBF;
  --purple-tint:rgba(139,95,191,0.14);
  --radius-sm:  8px;
  --radius-md:  14px;
  --radius-lg:  20px;
  --font-head:  Cambria, Georgia, "Times New Roman", serif;
  --font-body:  Calibri, "Segoe UI", system-ui, -apple-system, sans-serif;
  --font-mono:  ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
  --sidebar-w:  248px;
}

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; height:100%; }
body{
  background-color: var(--ink);
  background-image:
    radial-gradient(1200px 720px at 18% 10%, rgba(210,2,2,0.26), transparent 60%),
    radial-gradient(1100px 680px at 85% 6%, rgba(255,189,0,0.15), transparent 62%),
    radial-gradient(1000px 700px at 50% 100%, rgba(255,189,0,0.05), transparent 65%);
  background-attachment: fixed;
  color: var(--text-hi);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
  line-height: 1.45;
}
::selection{ background: var(--amber); color: var(--ink); }
*::-webkit-scrollbar{ width:8px; height:8px; }
*::-webkit-scrollbar-track{ background: transparent; }
*::-webkit-scrollbar-thumb{ background: var(--hairline-2); border-radius: 8px; }
*::-webkit-scrollbar-thumb:hover{ background: #455080; }
a{ color: inherit; text-decoration: none; }
button{ font-family: inherit; cursor: pointer; }
:focus-visible{ outline: 2px solid var(--amber); outline-offset: 2px; border-radius: 6px; }
@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

/* ================================================================
   APP SHELL
================================================================ */
#app{ display:flex; height:100vh; width:100vw; overflow:hidden; }

/* ---------- Sidebar ---------- */
.sidebar{
  width: var(--sidebar-w);
  flex-shrink:0;
  background: var(--ink-2);
  border-right: 1px solid var(--hairline);
  display:flex;
  flex-direction: column;
  padding: 18px 14px;
}
.brand{
  display:flex; align-items:center; gap:10px;
  padding: 6px 8px 18px 8px;
  margin-bottom: 6px;
  border-bottom: 1px solid var(--hairline);
}
.brand-mark{
  width:36px; height:36px; border-radius:10px;
  background: linear-gradient(145deg, var(--amber), var(--gold));
  display:flex; align-items:center; justify-content:center;
  font-family: var(--font-head); font-weight:700; font-size:16px; color:var(--ink);
  flex-shrink:0;
}
.brand-text{ display:flex; flex-direction:column; }
.brand-name{ font-family: var(--font-head); font-size:18px; font-weight:700; letter-spacing:0.3px; }
.brand-sub{ font-size:10.5px; color:var(--text-low); letter-spacing:0.4px; margin-top:1px; }

.nav-group-label{
  font-size: 10px; letter-spacing: 1.4px; color: var(--text-low);
  text-transform: uppercase; font-weight:700;
  padding: 16px 10px 6px 10px;
}
.nav{ display:flex; flex-direction:column; gap:1px; }
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding: 9px 10px; border-radius: var(--radius-sm);
  color: var(--text-mid); background: transparent; border:none;
  font-size: 13.5px; text-align:left; width:100%;
  transition: background 0.12s, color 0.12s;
}
.nav-item:hover{ background: var(--panel); color: var(--text-hi); }
.nav-item.active{ background: var(--panel-2); color: var(--text-hi); }
.nav-item.active .nav-dot{ background: var(--accent, var(--amber)); }
.nav-icon{
  width:18px; height:18px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  opacity:0.92;
}
.nav-dot{ width:6px; height:6px; border-radius:50%; background: var(--hairline-2); flex-shrink:0; margin-left:auto; }
.nav-badge{
  margin-left:auto; font-size:10px; font-weight:700; padding:1px 6px; border-radius:8px;
  background: var(--bad-tint); color: #E8967B;
}

.sidebar-footer{
  margin-top:auto; padding-top:14px; border-top:1px solid var(--hairline);
  display:flex; align-items:center; gap:10px; padding-left:8px;
}
.avatar{
  width:30px; height:30px; border-radius:50%; background: var(--panel-3);
  display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;
  color: var(--text-mid); flex-shrink:0;
}
.footer-text{ display:flex; flex-direction:column; min-width:0; }
.footer-name{ font-size:12.5px; font-weight:600; color:var(--text-hi); }
.footer-role{ font-size:10.5px; color:var(--text-low); }
.autonomy-pill{
  margin-left:auto; font-size:9.5px; font-weight:700; padding:3px 7px; border-radius:7px;
  background: var(--amber-tint); color: var(--amber); white-space:nowrap;
}

/* ---------- Main column ---------- */
.main{
  flex:1; display:flex; flex-direction:column; min-width:0;
  background:
    radial-gradient(ellipse 900px 500px at 15% -8%, rgba(217,142,59,0.05), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(201,162,39,0.05), transparent 60%),
    var(--ink);
  overflow:hidden;
}

/* ---------- Top command bar ---------- */
.command-zone{
  flex-shrink:0;
  padding: 22px 32px 16px 32px;
  border-bottom: 1px solid var(--hairline);
}
.command-bar{
  display:flex; align-items:center; gap:12px;
  background: var(--panel);
  border: 1px solid var(--hairline-2);
  border-radius: var(--radius-lg);
  padding: 6px 8px 6px 18px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.command-bar:focus-within{
  border-color: var(--amber);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3), 0 0 0 3px var(--amber-tint);
}
.command-glyph{
  width:22px; height:22px; flex-shrink:0; color: var(--amber);
  display:flex; align-items:center; justify-content:center;
}
.command-input{
  flex:1; background:transparent; border:none; color:var(--text-hi);
  font-family: var(--font-body); font-size:15.5px; padding:10px 0;
}
.command-input::placeholder{ color: var(--text-low); }
.command-input:focus{ outline:none; }
.command-send{
  background: var(--amber); color: var(--ink); border:none; font-weight:700;
  font-size:13px; padding:10px 18px; border-radius: 11px; flex-shrink:0;
  transition: transform 0.08s, background 0.12s;
  display:flex; align-items:center; gap:6px;
}
.command-send:hover{ background:#E5A052; }
.command-send:active{ transform: scale(0.97); }
.command-suggestions{
  display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;
}
.suggestion-chip{
  background: var(--panel); border:1px solid var(--hairline); color: var(--text-mid);
  font-size:12px; padding:6px 12px; border-radius:999px; transition: all 0.12s;
}
.suggestion-chip:hover{ border-color: var(--amber); color: var(--text-hi); background:var(--amber-tint); }

/* ---------- Response card area (above domain content, dismissible) ---------- */
.response-zone{ padding: 0 32px; flex-shrink:0; }
.response-card{
  background: var(--panel-2);
  border: 1px solid var(--hairline-2);
  border-left: 3px solid var(--amber);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  margin-top:14px;
  margin-bottom: 4px;
  animation: slideIn 0.28s ease;
  position:relative;
}
.response-card.gold{ border-left-color: var(--gold); }
@keyframes slideIn{ from{ opacity:0; transform:translateY(-6px); } to{ opacity:1; transform:translateY(0); } }
.response-head{ display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.response-one-badge{
  font-family: var(--font-head); font-weight:700; font-size:11px; color: var(--ink);
  background: var(--amber); padding:2px 8px; border-radius:6px; letter-spacing:0.5px;
}
.response-one-badge.gold{ background: var(--gold); }
.response-query{ font-size:12px; color: var(--text-low); font-style:italic; }
.response-close{
  position:absolute; top:14px; right:14px; background:none; border:none; color:var(--text-low);
  font-size:16px; line-height:1; padding:2px 6px; border-radius:6px;
}
.response-close:hover{ background:var(--panel-3); color:var(--text-hi); }
.response-body{ font-size:14px; color:var(--text-hi); line-height:1.55; }
.response-body strong{ color: var(--amber); font-weight:700; }
.response-body .g{ color: var(--gold); font-weight:700; }
.response-meta-row{ display:flex; gap:18px; margin-top:12px; flex-wrap:wrap; }
.response-meta-item{ display:flex; flex-direction:column; gap:2px; }
.response-meta-label{ font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-low); }
.response-meta-value{ font-size:14px; font-weight:700; font-family:var(--font-mono); }

/* ---------- Domain content area ---------- */
.content{ flex:1; overflow-y:auto; padding: 22px 32px 40px 32px; }
.domain-header{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
.domain-title{ font-family: var(--font-head); font-size:26px; font-weight:700; color:var(--text-hi); }
.domain-sub{ font-size:13px; color:var(--text-low); margin-top:4px; }
.domain-tag{
  font-size:11px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase;
  padding:5px 11px; border-radius:999px;
}

/* ---------- Grid / cards ---------- */
.grid{ display:grid; gap:16px; }
.grid-4{ grid-template-columns: repeat(4, 1fr); }
.grid-3{ grid-template-columns: repeat(3, 1fr); }
.grid-2{ grid-template-columns: repeat(2, 1fr); }
@media (max-width: 1200px){ .grid-4{ grid-template-columns: repeat(2,1fr); } .grid-3{ grid-template-columns: repeat(2,1fr); } }
@media (max-width: 760px){ .grid-4, .grid-3, .grid-2{ grid-template-columns: 1fr; } }

.card{
  background: var(--panel);
  border: 1px solid var(--hairline);
  border-radius: var(--radius-md);
  padding: 18px;
}
.card.tight{ padding:14px 16px; }
.card-row-link{
  display:flex; align-items:center; justify-content:space-between;
  padding: 11px 0; border-bottom: 1px solid var(--hairline);
}
.card-row-link:last-child{ border-bottom:none; }

.stat-card{ display:flex; flex-direction:column; gap:8px; }
.stat-label{ font-size:11.5px; color:var(--text-low); font-weight:600; }
.stat-value{ font-family:var(--font-head); font-size:28px; font-weight:700; color:var(--text-hi); }
.stat-value.mono{ font-family: var(--font-mono); font-size:24px; }
.stat-delta{ font-size:12px; font-weight:700; display:flex; align-items:center; gap:4px; }
.stat-delta.up{ color: var(--good); }
.stat-delta.down{ color: var(--bad); }
.stat-delta.flat{ color: var(--text-low); }
.stat-foot{ font-size:11.5px; color:var(--text-low); margin-top:2px; }

.section-title{
  font-size: 13px; font-weight:700; color:var(--text-hi); margin: 28px 0 12px 0;
  display:flex; align-items:center; gap:8px;
}
.section-title:first-child{ margin-top:0; }
.section-title .count{
  font-size:11px; font-weight:700; color:var(--text-low); background:var(--panel-2);
  padding:1px 8px; border-radius:999px;
}

/* List rows used across domains */
.list-card{ background:var(--panel); border:1px solid var(--hairline); border-radius:var(--radius-md); overflow:hidden; }
.list-row{
  display:flex; align-items:center; gap:14px; padding: 14px 18px;
  border-bottom: 1px solid var(--hairline);
  transition: background 0.12s;
}
.list-row:last-child{ border-bottom:none; }
.list-row:hover{ background: var(--panel-2); }
.list-icon{
  width:36px; height:36px; border-radius:10px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.list-main{ flex:1; min-width:0; }
.list-title{ font-size:13.5px; font-weight:600; color:var(--text-hi); }
.list-sub{ font-size:12px; color:var(--text-low); margin-top:2px; }
.list-aux{ text-align:right; flex-shrink:0; }
.list-value{ font-size:13.5px; font-weight:700; font-family:var(--font-mono); }
.list-value-sub{ font-size:11px; color:var(--text-low); margin-top:2px; }

.badge{
  font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px; letter-spacing:0.2px;
  white-space:nowrap;
}
.badge.good{ background:var(--good-tint); color:var(--good); }
.badge.warn{ background:var(--warn-tint); color:var(--warn); }
.badge.bad{ background:var(--bad-tint); color:#E8967B; }
.badge.amber{ background:var(--amber-tint); color:var(--amber); }
.badge.gold{ background:var(--gold-tint); color:var(--gold); }
.badge.teal{ background:var(--teal-tint); color:#7FBFBF; }
.badge.purple{ background:var(--purple-tint); color:#B79BDB; }
.badge.neutral{ background:var(--panel-3); color:var(--text-mid); }

.progress-track{ height:6px; background:var(--panel-3); border-radius:999px; overflow:hidden; margin-top:8px; }
.progress-fill{ height:100%; border-radius:999px; transition: width 0.4s ease; }

.divider{ height:1px; background:var(--hairline); margin: 22px 0; border:none; }

.empty-note{ color:var(--text-low); font-size:12.5px; padding: 18px; text-align:center; }

.btn{
  background: var(--panel-2); border:1px solid var(--hairline-2); color:var(--text-hi);
  font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:9px;
  transition: background 0.12s, border-color 0.12s;
}
.btn:hover{ background:var(--panel-3); border-color: var(--text-low); }
.btn.primary{ background: var(--amber); color: var(--ink); border-color: var(--amber); }
.btn.primary:hover{ background:#E5A052; }
.btn.gold{ background: var(--gold); color: var(--ink); border-color: var(--gold); }
.btn.gold:hover{ background:#DDB544; }
.btn.ghost{ background:transparent; border-color:var(--hairline); }
.btn.small{ font-size:11px; padding:5px 10px; }

.two-col{ display:grid; grid-template-columns: 1.6fr 1fr; gap:18px; align-items:start; }
@media (max-width: 1100px){ .two-col{ grid-template-columns:1fr; } }

.mini-bar-row{ display:flex; align-items:center; gap:10px; padding: 7px 0; }
.mini-bar-label{ width:120px; font-size:12px; color:var(--text-mid); flex-shrink:0; }
.mini-bar-track{ flex:1; height:7px; background:var(--panel-3); border-radius:999px; overflow:hidden; }
.mini-bar-fill{ height:100%; border-radius:999px; }
.mini-bar-value{ width:54px; text-align:right; font-size:12px; font-family:var(--font-mono); color:var(--text-hi); flex-shrink:0; }

/* Sparkline */
.spark{ display:block; }

/* Toast */
.toast-stack{ position:fixed; bottom:22px; right:22px; display:flex; flex-direction:column; gap:8px; z-index:50; }
.toast{
  background: var(--panel-2); border:1px solid var(--hairline-2); border-left:3px solid var(--good);
  border-radius: var(--radius-sm); padding:12px 16px; font-size:13px; color:var(--text-hi);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35); min-width:240px;
  animation: toastIn 0.25s ease;
}
@keyframes toastIn{ from{ opacity:0; transform: translateX(20px); } to{ opacity:1; transform:translateX(0); } }

@keyframes pulse{
  0%{ box-shadow: 0 0 0 0 rgba(197,87,46,0.5); }
  70%{ box-shadow: 0 0 0 8px rgba(197,87,46,0); }
  100%{ box-shadow: 0 0 0 0 rgba(197,87,46,0); }
}
.command-mic{ transition: background 0.15s, color 0.15s; }

/* Mobile collapse */
.mobile-nav-toggle{ display:none; }
@media (max-width: 860px){
  .sidebar{ position:fixed; left:0; top:0; bottom:0; z-index:40; transform: translateX(-100%); transition: transform 0.2s ease; }
  .sidebar.open{ transform:translateX(0); }
  .mobile-nav-toggle{
    display:flex; align-items:center; gap:8px; background:var(--panel); border:1px solid var(--hairline);
    color:var(--text-hi); padding:8px 12px; border-radius:10px; margin-bottom:10px; width:fit-content;
  }
  .grid-4, .grid-3, .grid-2{ grid-template-columns:1fr; }
  .command-zone{ padding:16px; }
  .content{ padding:16px; }
}
</style>
</head>
<body>
<div id="app"></div>
<script src="./data.js"></script>
<script src="./icons.js"></script>
<script src="./onboarding.js"></script>
<script src="./app.js" defer data-deferred-boot="true"></script>
<script src="./register-sw.js"></script>
</body>
</html>
