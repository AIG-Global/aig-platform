<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ONE — Admin & Monitoring</title>
<style>
:root{
  --ink:        #070707;
  --ink-2:      #020617;
  --panel:      rgba(255,255,255,0.045);
  --panel-2:    rgba(255,255,255,0.08);
  --panel-3:    rgba(255,255,255,0.12);
  --hairline:   rgba(255,255,255,0.10);
  --hairline-2: rgba(255,189,0,0.30);
  --text-hi:    rgba(255,255,255,0.96);
  --text-mid:   rgba(255,255,255,0.62);
  --text-low:   rgba(255,255,255,0.42);
  --amber:      #FFBD00;
  --amber-tint: rgba(255,189,0,0.14);
  --gold:       #FFBD00;
  --gold-tint:  rgba(255,189,0,0.14);
  --good:       #2FB873;
  --good-tint:  rgba(47,184,115,0.15);
  --warn:       #FF8A00;
  --warn-tint:  rgba(255,138,0,0.16);
  --bad:        #D20202;
  --bad-tint:   rgba(210,2,2,0.18);
  --purple:     #B98CFF;
  --purple-tint:rgba(185,140,255,0.14);
  --font-head:  Cambria, Georgia, serif;
  --font-body:  Calibri, "Segoe UI", system-ui, sans-serif;
  --font-mono:  ui-monospace, "SF Mono", Consolas, monospace;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; height:100%; }
body{
  background-color: var(--ink);
  background-image:
    radial-gradient(1200px 720px at 18% 12%, rgba(210,2,2,0.30), transparent 60%),
    radial-gradient(1100px 680px at 82% 8%, rgba(255,189,0,0.16), transparent 62%),
    radial-gradient(1000px 700px at 50% 100%, rgba(255,189,0,0.06), transparent 65%);
  background-attachment: fixed;
  color:var(--text-hi); font-family:var(--font-body); font-size:14px; -webkit-font-smoothing:antialiased;
}
*::-webkit-scrollbar{ width:8px; height:8px; }
*::-webkit-scrollbar-thumb{ background:var(--hairline-2); border-radius:8px; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; }
input,select{ font-family:inherit; }
:focus-visible{ outline:2px solid var(--amber); outline-offset:2px; }

#app{ display:flex; height:100vh; width:100vw; overflow:hidden; }
.sidebar{ width:230px; flex-shrink:0; background:rgba(2,6,23,0.55); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-right:1px solid var(--hairline); padding:18px 14px; display:flex; flex-direction:column; }
.brand{ display:flex; align-items:center; gap:10px; padding:6px 8px 18px 8px; margin-bottom:6px; border-bottom:1px solid var(--hairline); }
.brand-mark{ width:36px; height:36px; border-radius:10px; background:linear-gradient(145deg, #FFD24D, #FFBD00); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-weight:700; font-size:16px; color:#1a1200; flex-shrink:0; box-shadow:0 0 18px rgba(255,189,0,0.35); }
.brand-name{ font-family:var(--font-head); font-size:17px; font-weight:700; }
.brand-sub{ font-size:10px; letter-spacing:0.6px; color:var(--text-low); margin-top:1px; }
.nav-group-label{ font-size:10px; letter-spacing:1.2px; color:var(--text-low); text-transform:uppercase; font-weight:700; padding:14px 10px 6px 10px; }
.nav{ display:flex; flex-direction:column; gap:1px; }
.nav-item{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; color:var(--text-mid); background:transparent; border:none; font-size:13px; text-align:left; width:100%; }
.nav-item:hover{ background:var(--panel); color:var(--text-hi); }
.nav-item.active{ background:var(--panel-2); color:var(--text-hi); border-left:2px solid var(--amber); }
.sidebar-footer{ margin-top:auto; padding-top:14px; border-top:1px solid var(--hairline); }
.btn{ background:var(--panel-2); border:1px solid var(--hairline-2); color:var(--text-hi); font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:9px; }
.btn:hover{ background:var(--panel-3); }
.btn.primary{ background:var(--amber); color:var(--ink); border-color:var(--amber); }
.btn.gold{ background:var(--gold); color:var(--ink); border-color:var(--gold); }
.btn.bad{ background:var(--bad-tint); color:#E8967B; border-color:var(--bad); }
.btn.small{ font-size:11px; padding:5px 10px; }
.btn:disabled{ opacity:0.5; cursor:not-allowed; }

.main{ flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
#main-content{ flex:1; overflow-y:auto; padding:26px 32px 50px 32px; }
.page-header{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:10px; }
.page-title{ font-family:var(--font-head); font-size:26px; font-weight:700; }
.page-sub{ font-size:13px; color:var(--text-low); margin-top:4px; }

.grid{ display:grid; gap:16px; }
.grid-4{ grid-template-columns:repeat(4,1fr); }
.grid-3{ grid-template-columns:repeat(3,1fr); }
.grid-2{ grid-template-columns:repeat(2,1fr); }
@media (max-width:1200px){ .grid-4{ grid-template-columns:repeat(2,1fr); } .grid-3{ grid-template-columns:repeat(2,1fr); } }

@media (max-width:860px){
  .sidebar{ position:fixed; left:0; top:0; bottom:0; z-index:40; transform:translateX(-100%); transition:transform .2s ease; box-shadow:20px 0 60px rgba(0,0,0,0.6); }
  .sidebar.open{ transform:translateX(0); }
  .main{ width:100%; }
  .mobile-nav-toggle{
    display:flex; align-items:center; gap:8px; background:var(--panel); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--hairline-2); color:var(--text-hi); padding:9px 14px; border-radius:10px;
    font-size:13px; font-weight:600; margin:14px 16px 0 16px; flex-shrink:0; width:fit-content;
  }
  #main-content{ padding:16px; }
  .grid-4, .grid-3, .grid-2{ grid-template-columns:1fr; }
  table{ font-size:11.5px; }
}
@media (min-width:861px){ .mobile-nav-toggle{ display:none; } }

.card{ background:var(--panel); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid var(--hairline); border-radius:14px; padding:18px; }
.card.tight{ padding:14px 16px; }
.stat-label{ font-size:11.5px; color:var(--text-low); font-weight:600; }
.stat-value{ font-family:var(--font-head); font-size:28px; font-weight:700; margin-top:4px; }
.stat-foot{ font-size:11px; color:var(--text-low); margin-top:4px; }

.section-title{ font-size:13px; font-weight:700; margin:26px 0 12px 0; display:flex; align-items:center; gap:8px; }
.section-title .count{ font-size:11px; font-weight:700; color:var(--text-low); background:var(--panel-2); padding:1px 8px; border-radius:999px; }

.list-card{ background:var(--panel); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid var(--hairline); border-radius:14px; overflow:hidden; }
.list-row{ display:flex; align-items:center; gap:14px; padding:13px 18px; border-bottom:1px solid var(--hairline); }
.list-row:last-child{ border-bottom:none; }
.list-row:hover{ background:var(--panel-2); }
.list-main{ flex:1; min-width:0; }
.list-title{ font-size:13.5px; font-weight:600; }
.list-sub{ font-size:11.5px; color:var(--text-low); margin-top:2px; }
.list-aux{ text-align:right; flex-shrink:0; }
.list-value{ font-size:13.5px; font-weight:700; font-family:var(--font-mono); }
.rank-badge{ width:26px; height:26px; border-radius:7px; background:var(--panel-2); display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:700; color:var(--text-mid); flex-shrink:0; }
.rank-badge.top3{ background:var(--gold-tint); color:var(--gold); }

.badge{ font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px; white-space:nowrap; }
.badge.good{ background:var(--good-tint); color:var(--good); }
.badge.warn{ background:var(--warn-tint); color:var(--warn); }
.badge.bad{ background:var(--bad-tint); color:#E8967B; }
.badge.amber{ background:var(--amber-tint); color:var(--amber); }
.badge.gold{ background:var(--gold-tint); color:var(--gold); }
.badge.purple{ background:var(--purple-tint); color:#B79BDB; }
.badge.neutral{ background:var(--panel-3); color:var(--text-mid); }

.mini-bar-row{ display:flex; align-items:center; gap:10px; padding:7px 0; }
.mini-bar-label{ width:160px; font-size:12px; color:var(--text-mid); flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mini-bar-track{ flex:1; height:7px; background:var(--panel-3); border-radius:999px; overflow:hidden; }
.mini-bar-fill{ height:100%; border-radius:999px; }
.mini-bar-value{ width:60px; text-align:right; font-size:12px; font-family:var(--font-mono); flex-shrink:0; }

.bars-chart{ display:flex; align-items:flex-end; gap:4px; height:140px; padding-top:10px; }
.bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end; }
.bar-fill{ width:100%; border-radius:4px 4px 0 0; min-height:2px; }
.bar-label{ font-size:9px; color:var(--text-low); writing-mode:vertical-rl; text-orientation:mixed; height:34px; }

table{ width:100%; border-collapse:collapse; font-size:12.5px; }
th{ text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-low); padding:8px 10px; border-bottom:1px solid var(--hairline); }
td{ padding:10px; border-bottom:1px solid var(--hairline); }
tr:hover td{ background:var(--panel-2); }
.table-wrap{ background:var(--panel); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid var(--hairline); border-radius:14px; overflow:hidden; }
.table-wrap table{ font-size:12.5px; }

input[type=text], input[type=password], select{
  background:var(--panel-2); border:1px solid var(--hairline-2); border-radius:9px; color:var(--text-hi);
  padding:9px 12px; font-size:13px;
}

.modal-overlay{ position:fixed; inset:0; background:rgba(7,10,20,0.85); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; }
.modal-card{ background:rgba(10,10,14,0.88); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid var(--hairline-2); border-radius:18px; padding:26px; max-width:460px; width:100%; box-shadow:0 30px 90px rgba(0,0,0,0.5); }

.login-screen{ height:100vh; width:100vw; display:flex; align-items:center; justify-content:center; background:transparent; }
.login-card{ background:rgba(10,10,14,0.78); backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px); border:1px solid var(--hairline); border-radius:20px; padding:36px; width:100%; max-width:380px; box-shadow:0 30px 90px rgba(0,0,0,0.5); }

.toast-stack{ position:fixed; bottom:22px; right:22px; display:flex; flex-direction:column; gap:8px; z-index:300; }
.toast{ background:rgba(10,10,14,0.85); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border:1px solid var(--hairline-2); border-left:3px solid var(--good); border-radius:8px; padding:12px 16px; font-size:13px; min-width:260px; box-shadow:0 8px 24px rgba(0,0,0,0.5); }
.toast.error{ border-left-color:var(--bad); }

.empty-note{ color:var(--text-low); font-size:12.5px; padding:24px; text-align:center; }
.kv-row{ display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--hairline); font-size:12.5px; }
.kv-row:last-child{ border-bottom:none; }
.kv-row span:first-child{ color:var(--text-mid); }
.tabs{ display:flex; gap:4px; margin-bottom:18px; }
.tab-btn{ background:var(--panel); border:1px solid var(--hairline); color:var(--text-mid); font-size:12.5px; font-weight:600; padding:8px 16px; border-radius:9px; }
.tab-btn.active{ background:var(--amber-tint); color:var(--amber); border-color:var(--amber); }
</style>
</head>
<body>
<div id="app"></div>
<script src="./app.js"></script>
<script src="./pages-monitoring.js"></script>
<script src="./pages-management.js"></script>
<script src="./boot.js"></script>
</body>
</html>
